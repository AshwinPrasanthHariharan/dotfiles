# -----------------------------
# FONT (clean + readable)
# -----------------------------
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
font_size        14

# Render Tamil block characters using a Tamil-capable fallback font.
symbol_map U+0B80-U+0BFF Noto Sans Tamil

# -----------------------------
# APPEARANCE (Konsole-like)
# -----------------------------
background_opacity 0.8
cursor_shape beam
cursor_blink_interval 0.5

# Smooth scrolling
scrollback_lines 10000

# -----------------------------
# COLORS (EndeavourOS-inspired)
# -----------------------------
foreground #E6E1F5
background #1A1B26

cursor #A277FF
cursor_text_color #1A1B26

selection_foreground #1A1B26
selection_background #A277FF

color0  #232433
color1  #FF5C8A
color2  #5AF78E
color3  #F3F99D
color4  #57C7FF
color5  #A277FF
color6  #9AEDFE
color7  #E6E1F5

color8  #4B4D68
color9  #FF7AA2
color10 #7CFFB2
color11 #F8FFB8
color12 #7FDBFF
color13 #C099FF
color14 #B3F4FF
color15 #FFFFFF

# -----------------------------
# TABS (like Konsole)
# -----------------------------
enable_tab_bar yes
tab_bar_edge top
tab_bar_style powerline
allow_remote_control yes
# -----------------------------
# KEYBINDINGS (THIS IS THE MAGIC)
# Konsole-like feel
# -----------------------------

# New tab (like Konsole Ctrl+Shift+T)
map ctrl+shift+t new_tab

# Close tab
map ctrl+shift+q close_tab

# Next / Previous tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

# Next / Previous tab with Ctrl+Shift+Right/Left
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab

# Split (like Konsole) - force splits layout for consistent behavior
map ctrl+shift+d combine : goto_layout splits : launch --location=vsplit --cwd=current
map ctrl+shift+enter combine : goto_layout splits : launch --location=hsplit --cwd=current

# Navigate splits
map alt+left neighboring_window left
map alt+right neighboring_window right
map alt+up neighboring_window up
map alt+down neighboring_window down

# Resize splits
map ctrl+alt+left resize_window narrower
map ctrl+alt+right resize_window wider
map ctrl+alt+up resize_window taller
map ctrl+alt+down resize_window shorter

# Copy paste (normal behavior)
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Close only the current split (window)
map alt+q close_window

# -----------------------------
# PERFORMANCE
# -----------------------------
repaint_delay 10
input_delay 3
sync_to_monitor yes

# -----------------------------
# SHELL (your zsh)
# -----------------------------
shell /usr/bin/zsh
