# -----------------------------
# FONT (clean + readable)
# -----------------------------
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
font_size        14

# -----------------------------
# APPEARANCE (Konsole-like)
# -----------------------------
background_opacity 0.92
cursor_shape beam
cursor_blink_interval 0.5

# Smooth scrolling
scrollback_lines 10000

# -----------------------------
# COLORS (safe dark theme)
# -----------------------------
foreground #d0d0d0
background #0e0e0e

selection_foreground #000000
selection_background #ffffff

# Catppuccin Mocha (best overall)

foreground #CDD6F4
background #1E1E2E

cursor #F5E0DC

selection_foreground #1E1E2E
selection_background #F5E0DC

color0  #45475A
color1  #F38BA8
color2  #A6E3A1
color3  #F9E2AF
color4  #89B4FA
color5  #F5C2E7
color6  #94E2D5
color7  #BAC2DE

color8  #585B70
color9  #bf5473
color10 #A6E3A1
color11 #F9E2AF
color12 #89B4FA
color13 #F5C2E7
color14 #94E2D5
color15 #A6ADC8

# -----------------------------
# TABS (like Konsole)
# -----------------------------
enable_tab_bar yes
tab_bar_edge top
tab_bar_style powerline
allow_remote_control yes
# -----------------------------
# KEYBINDINGS (THIS IS THE MAGIC)
# Konsole-like feel
# -----------------------------

# New tab (like Konsole Ctrl+Shift+T)
map ctrl+shift+t new_tab

# Close tab
map ctrl+shift+q close_tab

# Next / Previous tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

# Next / Previous tab with Ctrl+Shift+Right/Left
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab

# Split (like Konsole)
map ctrl+shift+d launch --location=vsplit
map ctrl+shift+enter launch --location=hsplit

# Navigate splits
map alt+left neighboring_window left
map alt+right neighboring_window right
map alt+up neighboring_window up
map alt+down neighboring_window down

# Resize splits
map ctrl+alt+left resize_window narrower
map ctrl+alt+right resize_window wider
map ctrl+alt+up resize_window taller
map ctrl+alt+down resize_window shorter

# Copy paste (normal behavior)
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Close only the current split (window)
map alt+q close_window

# -----------------------------
# PERFORMANCE
# -----------------------------
repaint_delay 10
input_delay 3
sync_to_monitor yes

# -----------------------------
# SHELL (your zsh)
# -----------------------------
shell /usr/bin/zsh
